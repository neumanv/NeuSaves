<header class="bg-blanco border border-borde rounded-xl w-[65%] mx-auto my-2">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-3">
    <img src="NeuSaves.png" alt="Logo de NeuSaves" class="h-10 w-auto" />
    <span class="font-titulos text-2xl font-bold text-texto">NeuSaves</span>

    @if (mostrarPerfil()){
      <div class="relative ml-auto">
        <button type="button" (click)="toggleMenu()" title="Perfil" id="perfil" class="w-10 h-10 rounded-full bg-fondo border border-borde flex items-center justify-center text-texto hover:bg-borde transition-colors cursor-pointer">
          <i class="bi bi-person-fill" style="font-size: 1.25rem;"></i>
        </button>

        @if (menuAbierto()){
          <div class="fixed inset-0 z-40" (click)="cerrarMenu()"></div>
          <div class="absolute right-0 z-50 mt-1 w-44 bg-blanco border border-borde rounded-lg shadow-xl overflow-hidden">
            <button type="button" (click)="cerrarMenu()" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-left text-texto hover:bg-fondo transition-colors cursor-pointer">
              Editar perfil
            </button>
            <button type="button" (click)="salir()" class="w-full flex items-center gap-2 px-3 py-2 text-sm text-left text-peligro/80 hover:bg-peligro/10 transition-colors cursor-pointer">
              <i class="bi bi-box-arrow-left"></i>
              Salir
            </button>
          </div>
        }
      </div>
    }
  </div>
</header>
