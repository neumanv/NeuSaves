server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker mapea el puerto 80 interno a otro puerto externo (ej. 4200): sin esto,
    # las redirecciones automáticas de nginx (como /acceso -> /acceso/) usarían el
    # puerto interno (80) en vez del real, dejando la pantalla sin cargar
    port_in_redirect off;

    # Rutas del router de Angular: si el fichero no existe, sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # El index.html nunca se cachea: así el navegador siempre carga los bundles nuevos (con hash)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
