server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Rutas del router de Angular: si el fichero no existe, sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # El index.html nunca se cachea: así el navegador siempre carga los bundles nuevos (con hash)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
